name: Hardware support report
description: Report firmware capabilities or request support for a Gigabyte/AORUS model
title: "[hardware] "
labels: [hardware, compatibility]
body:
  - type: markdown
    attributes:
      value: |
        Compatibility reports are evidence only. They never enable firmware writes or expand AeroControl's verified-model allowlist automatically.

        Prefer AeroControl's Diagnostics > Refresh > Export JSON workflow. Review the file before attaching it. Do not include serial numbers, UUIDs, MAC addresses, usernames, raw paths, secrets, or proprietary binaries.
  - type: input
    id: model
    attributes:
      label: Laptop model
      placeholder: AERO 15-SA
    validations:
      required: true
  - type: input
    id: sku
    attributes:
      label: System SKU
      placeholder: P75SA
    validations:
      required: true
  - type: input
    id: bios
    attributes:
      label: BIOS version
      placeholder: FB09
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and build
      placeholder: Windows 11 24H2, build 26100
    validations:
      required: true
  - type: textarea
    id: compatibility-report
    attributes:
      label: Sanitized AeroControl compatibility report
      description: Open Diagnostics, select Refresh, export the JSON, review it, then drag the file here. If export is unavailable, explain why and complete the method-name fields below.
      placeholder: Drag the reviewed AeroControl diagnostics JSON here, or explain why it is unavailable.
    validations:
      required: true
  - type: textarea
    id: get-methods
    attributes:
      label: GB_WMIACPI_Get method names
      description: Method names only. Copy them from the report or use the read-only command in docs/compatibility.md.
      render: text
    validations:
      required: true
  - type: textarea
    id: set-methods
    attributes:
      label: GB_WMIACPI_Set method names
      description: Method names only. Copy them from the report or use the read-only command. Do not test unknown writes.
      render: text
    validations:
      required: true
  - type: textarea
    id: observations
    attributes:
      label: Read-only observations
      description: Describe telemetry that works or fails. Do not invoke unknown methods or experiment with undocumented writes.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety
      options:
        - label: I reviewed the exported file and removed any personal identifiers or unrelated data.
          required: true
        - label: I have not attached proprietary binaries, firmware, or copied vendor code.
          required: true
        - label: I understand that this report is evidence only and does not enable firmware writes for my model.
          required: true
