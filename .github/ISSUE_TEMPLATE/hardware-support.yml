name: Hardware support report
description: Report firmware capabilities or request support for a Gigabyte/AORUS model
title: "[hardware] "
labels: [hardware, compatibility]
body:
  - type: markdown
    attributes:
      value: |
        Do not include serial numbers, UUIDs, MAC addresses, usernames, or proprietary binaries.
  - type: input
    id: model
    attributes:
      label: Laptop model
      placeholder: AERO 15-SA
    validations:
      required: true
  - type: input
    id: sku
    attributes:
      label: System SKU
      placeholder: P75SA
    validations:
      required: true
  - type: input
    id: bios
    attributes:
      label: BIOS version
      placeholder: FB09
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and build
      placeholder: Windows 11 24H2, build 26100
    validations:
      required: true
  - type: textarea
    id: get-methods
    attributes:
      label: GB_WMIACPI_Get method names
      description: Method names only. Use the read-only command in docs/compatibility.md.
      render: text
    validations:
      required: true
  - type: textarea
    id: set-methods
    attributes:
      label: GB_WMIACPI_Set method names
      description: Method names only. Do not test unknown writes.
      render: text
    validations:
      required: true
  - type: textarea
    id: observations
    attributes:
      label: Read-only observations
      description: Describe telemetry that works or fails. Do not experiment with undocumented writes.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and safety
      options:
        - label: I removed serial numbers and personal identifiers.
          required: true
        - label: I have not attached proprietary binaries, firmware, or copied vendor code.
          required: true
