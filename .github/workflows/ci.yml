name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AeroControl.sln

      - name: Verify formatting
        run: dotnet format AeroControl.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build AeroControl.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AeroControl.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Publish Windows x64
        run: >-
          dotnet publish src/AeroControl/AeroControl.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=None
          --output artifacts/win-x64

      - name: Smoke published demo
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $coolingProcess = Start-Process -FilePath artifacts/win-x64/AeroControl.exe -ArgumentList @(
            '--demo', '--view', 'cooling', '--capture', 'artifacts/smoke/cooling.png'
          ) -Wait -PassThru
          if ($coolingProcess.ExitCode -ne 0) { throw "Cooling view smoke failed with exit code $($coolingProcess.ExitCode)." }
          $batteryProcess = Start-Process -FilePath artifacts/win-x64/AeroControl.exe -ArgumentList @(
            '--demo', '--view', 'battery', '--capture', 'artifacts/smoke/battery.png'
          ) -Wait -PassThru
          if ($batteryProcess.ExitCode -ne 0) { throw "Battery view smoke failed with exit code $($batteryProcess.ExitCode)." }
          foreach ($image in 'artifacts/smoke/cooling.png', 'artifacts/smoke/battery.png') {
            if (-not (Test-Path $image)) { throw "Missing smoke image: $image" }
            if ((Get-Item $image).Length -lt 10000) { throw "Smoke image is unexpectedly small: $image" }
          }
          if ((Get-FileHash artifacts/smoke/cooling.png).Hash -eq (Get-FileHash artifacts/smoke/battery.png).Hash) {
            throw 'Cooling and Battery smoke images are identical.'
          }
          Add-Type -AssemblyName System.Drawing
          function Get-AccentCount([System.Drawing.Bitmap]$bitmap, [int]$startX, [int]$endX) {
            $count = 0
            for ($y = 65; $y -lt 100; $y++) {
              for ($x = $startX; $x -lt $endX; $x++) {
                $pixel = $bitmap.GetPixel($x, $y)
                if ($pixel.R -eq 11 -and $pixel.G -eq 116 -and $pixel.B -eq 82) { $count++ }
              }
            }
            return $count
          }
          function Get-BodyColorCount(
            [System.Drawing.Bitmap]$bitmap,
            [int]$red,
            [int]$green,
            [int]$blue) {
            $count = 0
            for ($y = 240; $y -lt 365; $y++) {
              for ($x = 25; $x -lt 305; $x++) {
                $pixel = $bitmap.GetPixel($x, $y)
                if ($pixel.R -eq $red -and $pixel.G -eq $green -and $pixel.B -eq $blue) { $count++ }
              }
            }
            return $count
          }
          $cooling = [System.Drawing.Bitmap]::new((Resolve-Path artifacts/smoke/cooling.png).Path)
          $battery = [System.Drawing.Bitmap]::new((Resolve-Path artifacts/smoke/battery.png).Path)
          try {
            if ((Get-AccentCount $cooling 20 136) -lt 100 -or (Get-AccentCount $cooling 136 252) -gt 10) {
              throw 'Cooling screenshot does not show the Cooling tab as selected.'
            }
            if ((Get-AccentCount $battery 136 252) -lt 100 -or (Get-AccentCount $battery 20 136) -gt 10) {
              throw 'Battery screenshot does not show the Battery tab as selected.'
            }
            if ((Get-BodyColorCount $cooling 190 75 67) -lt 100 -or (Get-BodyColorCount $cooling 11 116 82) -gt 10) {
              throw 'Cooling screenshot does not contain the expected Cooling dashboard body.'
            }
            if ((Get-BodyColorCount $battery 11 116 82) -lt 500 -or (Get-BodyColorCount $battery 190 75 67) -gt 10) {
              throw 'Battery screenshot does not contain the expected Battery dashboard body.'
            }
          } finally {
            $cooling.Dispose()
            $battery.Dispose()
          }

      - name: Verify artifact legal files
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/win-x64/LICENSE)) { throw "Published LICENSE is missing." }
          if (-not (Test-Path artifacts/win-x64/DISCLAIMER.md)) { throw "Published DISCLAIMER.md is missing." }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: AeroControl-win-x64
          path: |
            artifacts/win-x64/
            artifacts/smoke/*.png
          if-no-files-found: error
