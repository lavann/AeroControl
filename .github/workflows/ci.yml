name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AeroControl.sln

      - name: Verify formatting
        run: dotnet format AeroControl.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build AeroControl.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AeroControl.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Publish Windows x64
        run: >-
          dotnet publish src/AeroControl/AeroControl.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=None
          --output artifacts/win-x64

      - name: Smoke published demo
        run: artifacts/win-x64/AeroControl.exe --demo --capture artifacts/smoke/dashboard.png

      - name: Verify artifact legal files
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/win-x64/LICENSE)) { throw "Published LICENSE is missing." }
          if (-not (Test-Path artifacts/win-x64/DISCLAIMER.md)) { throw "Published DISCLAIMER.md is missing." }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: AeroControl-win-x64
          path: |
            artifacts/win-x64/
            artifacts/smoke/dashboard.png
          if-no-files-found: error
